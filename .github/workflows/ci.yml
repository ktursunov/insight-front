name: CI

# Quality gates that run on every PR and on pushes to main: the Vitest unit
# suite (with coverage), ESLint, and the TypeScript type check. docker.yml
# only fires on main and just builds the image — these are the checks that
# actually validate the code before it lands. The three jobs run in parallel.
on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Unit tests & coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        # Read-only CI: don't persist the GITHUB_TOKEN in .git/config for
        # later steps (supply-chain hardening).
        with:
          persist-credentials: false

      # pnpm is set up before setup-node so the latter's `cache: pnpm` can
      # resolve the store. The pnpm version comes from the `packageManager`
      # field in package.json (pnpm@10.33.0).
      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests with coverage
        run: pnpm test:coverage

      # Producer only: hand the Cobertura (and the full HTML/lcov report) to the
      # `coverage` job, which renders the summary and runs the code-coverage gate.
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7
          if-no-files-found: warn

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        # Read-only CI: don't persist the GITHUB_TOKEN in .git/config for
        # later steps (supply-chain hardening).
        with:
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        # Read-only CI: don't persist the GITHUB_TOKEN in .git/config for
        # later steps (supply-chain hardening).
        with:
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: tsc --noEmit
        run: pnpm typecheck

  # Single coverage job (like constructorfabric/insight): consumes the Cobertura
  # the `test` job produced and BOTH renders the global coverage summary to the
  # job summary (informational warning — runs on push and PR) AND enforces the
  # code-coverage gate (hard-fails a PR when coverage of changed lines < 80%).
  coverage:
    name: Coverage summary & gate
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          # diff-cover needs the merge-base with the base branch, so fetch full history.
          fetch-depth: 0
          persist-credentials: false

      # Reuse the Cobertura the `test` job already produced — don't re-run tests.
      - name: Download coverage report
        uses: actions/download-artifact@v7
        with:
          name: coverage-report
          path: coverage/

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # Global coverage summary -> job summary. Non-failing warning; self-contained
      # (no third-party action). Renders on both push and PR.
      - name: Coverage summary
        if: always()
        run: python3 scripts/ci/coverage-summary.py >> "$GITHUB_STEP_SUMMARY"

      # --- Code-coverage gate (diff): pull requests only (needs a base to diff against) ---
      - name: Fetch base branch
        if: github.event_name == 'pull_request'
        run: git fetch --no-tags origin "${{ github.base_ref }}"

      - name: Install diff-cover
        if: github.event_name == 'pull_request'
        run: pip install diff-cover

      # Hard gate: fails the PR when coverage of changed lines is < 80%.
      # Markdown goes to the job summary (no PR comment → works on fork PRs).
      - name: Enforce code coverage on changed lines (>= 80%)
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.base_ref }}
        run: python3 scripts/ci/diff-coverage.py
